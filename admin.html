<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azhagu Hotel - Admin Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5efe6;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #2c1a0f, #3f2618);
            padding: 20px;
            border-radius: 24px;
            color: white;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #b7410e;
        }
        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .order-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            border-left: 6px solid #b7410e;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .order-card.pending { border-left-color: #b7410e; }
        .order-card.ready { border-left-color: #f39c12; }
        .order-card.done { border-left-color: #95a5a6; opacity: 0.7; }
        .order-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .order-id {
            font-weight: 800;
            font-size: 16px;
        }
        .customer-name {
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #2a7f49;
        }
        .order-items {
            background: #faf6f0;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            font-size: 13px;
        }
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .order-total {
            font-size: 20px;
            font-weight: 800;
            color: #b7410e;
        }
        .action-btn {
            background: #b7410e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .live-badge {
            background: #e74c3c;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        .login-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #f0e2cf;
            border-radius: 60px;
            margin: 15px 0;
            font-size: 16px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c1a0f;
            color: #ffecb3;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            display: none;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #9b7b5c;
            background: white;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <p style="color: #666; margin-bottom: 20px;">Azhagu Hotel Dashboard</p>
        <input type="password" id="adminPassword" class="login-input" placeholder="Enter password" onkeypress="if(event.key==='Enter') checkLogin()">
        <button class="action-btn" onclick="checkLogin()" style="width:100%;">Login</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div id="adminContent" style="display:none;">
    <div class="header">
        <div>
            <h1>🍛 Azhagu Hotel Admin</h1>
            <p>Real-Time Order Monitor - Cross Device</p>
        </div>
        <div>
            <span class="live-badge">🔴 LIVE</span>
            <button class="action-btn" onclick="logout()" style="background:#555; margin-left:10px;">Logout</button>
        </div>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div>📊 Total Orders</div>
            <div class="stat-number" id="totalOrders">0</div>
        </div>
        <div class="stat-card">
            <div>⏳ Pending</div>
            <div class="stat-number" id="pendingOrders">0</div>
        </div>
        <div class="stat-card">
            <div>🔥 Ready</div>
            <div class="stat-number" id="readyOrders">0</div>
        </div>
        <div class="stat-card">
            <div>✅ Completed</div>
            <div class="stat-number" id="completedOrders">0</div>
        </div>
        <div class="stat-card">
            <div>💰 Revenue</div>
            <div class="stat-number" id="totalRevenue">₹0</div>
        </div>
    </div>
    
    <div class="orders-container" id="ordersContainer">
        <div class="empty-state">📭 Loading orders...</div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // ========== YOUR FIREBASE CONFIGURATION ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBLrk_nmC2V0NvRKfhHdFzBi647xiuF1y0",
        authDomain: "azhagu-hotel.firebaseapp.com",
        projectId: "azhagu-hotel",
        storageBucket: "azhagu-hotel.firebasestorage.app",
        messagingSenderId: "357401937469",
        appId: "1:357401937469:web:a7a55fc0e59a5059660c54"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const ADMIN_PASSWORD = "admin123";
    let unsubscribeOrders = null;
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function checkLogin() {
        const pwd = document.getElementById('adminPassword').value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            startListening();
            showToast('✅ Login successful! Live orders loading...');
        } else {
            document.getElementById('loginError').innerText = '❌ Wrong password!';
        }
    }
    
    function logout() {
        if (unsubscribeOrders) unsubscribeOrders();
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        showToast('🔒 Logged out');
    }
    
    function startListening() {
        // Real-time listener for ALL orders from ALL customers
        unsubscribeOrders = db.collection('orders')
            .orderBy('timestamp', 'desc')
            .onSnapshot((snapshot) => {
                const orders = [];
                snapshot.forEach(doc => {
                    orders.push({ id: doc.id, ...doc.data() });
                });
                renderOrders(orders);
                updateStats(orders);
            }, (error) => {
                console.error('Error listening:', error);
                document.getElementById('ordersContainer').innerHTML = '<div class="empty-state">❌ Connection error! Check Firebase configuration.</div>';
                showToast('❌ Connection error!');
            });
    }
    
    function renderOrders(orders) {
        const container = document.getElementById('ordersContainer');
        if (orders.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 No orders yet. Customers will appear here.</div>';
            return;
        }
        
        container.innerHTML = orders.map((order, idx) => {
            const statusClass = order.status || 'pending';
            const statusText = statusClass === 'pending' ? '⏳ Pending' : (statusClass === 'ready' ? '🔥 Ready' : '✅ Done');
            const statusColor = statusClass === 'pending' ? '#b7410e' : (statusClass === 'ready' ? '#f39c12' : '#95a5a6');
            
            return `
                <div class="order-card ${statusClass}">
                    <div class="order-header">
                        <div class="order-id">${order.id || order.orderId || 'N/A'}</div>
                        <div>
                            <span class="customer-name">👤 ${order.customerName || 'Guest'}</span>
                            <span style="margin-left:8px; font-size:11px;">📱 ${order.device || 'Unknown'}</span>
                        </div>
                    </div>
                    <div class="order-items">
                        ${order.items ? order.items.map(item => `<span>🍽️ ${item.name} × ${item.qty} — ₹${item.total}</span><br>`).join('') : 'No items'}
                    </div>
                    <div class="order-footer">
                        <div class="order-total">₹${order.total || 0}</div>
                        <div style="font-size:11px;">🕐 ${order.timestamp ? new Date(order.timestamp).toLocaleTimeString() : 'Just now'}</div>
                        ${statusClass !== 'done' ? `
                            <button class="action-btn" onclick="updateOrderStatus('${order.id}', '${statusClass === 'pending' ? 'ready' : 'done'}')">
                                ${statusClass === 'pending' ? '✓ Mark Ready' : '✅ Complete'}
                            </button>
                        ` : '<span style="color:#888;">✅ Completed</span>'}
                    </div>
                </div>
            `;
        }).join('');
    }
    
    async function updateOrderStatus(orderId, newStatus) {
        try {
            await db.collection('orders').doc(orderId).update({ status: newStatus });
            showToast(`✅ Order marked as ${newStatus === 'ready' ? 'Ready' : 'Completed'}`);
        } catch (error) {
            console.error('Error updating:', error);
            showToast('❌ Failed to update order');
        }
    }
    
    function updateStats(orders) {
        const total = orders.length;
        const pending = orders.filter(o => o.status === 'pending').length;
        const ready = orders.filter(o => o.status === 'ready').length;
        const completed = orders.filter(o => o.status === 'done').length;
        const revenue = orders.filter(o => o.status === 'done').reduce((sum, o) => sum + (o.total || 0), 0);
        
        document.getElementById('totalOrders').innerText = total;
        document.getElementById('pendingOrders').innerText = pending;
        document.getElementById('readyOrders').innerText = ready;
        document.getElementById('completedOrders').innerText = completed;
        document.getElementById('totalRevenue').innerHTML = '₹' + revenue;
    }
</script>
</body>
</html>
