<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azhagu Hotel – Cloud Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --azh-primary: #b7410e;
  --azh-deep: #8b2c0d;
  --azh-gold: #e6b422;
  --azh-cream: #fff9ef;
  --azh-green: #2a7f49;
  --azh-dark: #2c1a0f;
  --azh-card: #ffffff;
  --azh-border: #f0e2cf;
  --azh-text: #2b1e12;
  --azh-muted: #9b7b5c;
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
  --shadow-lg: 0 20px 35px -10px rgba(0,0,0,0.15);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(135deg, #f5efe6 0%, #f0e8df 100%);
  color: var(--azh-text);
  min-height: 100vh;
}

/* Login Modal */
.login-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, rgba(44, 26, 15, 0.98), rgba(44, 26, 15, 0.95));
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
}
.login-card {
  background: white;
  border-radius: 48px;
  padding: 48px 40px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: fadeInUp 0.5s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: var(--azh-primary);
  margin-bottom: 8px;
}
.login-input-group {
  margin-bottom: 20px;
  text-align: left;
}
.login-input-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--azh-muted);
  margin-bottom: 5px;
}
.login-input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--azh-border);
  border-radius: 60px;
  font-size: 15px;
  font-family: inherit;
}
.login-input:focus {
  outline: none;
  border-color: var(--azh-primary);
}
.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--azh-primary), var(--azh-deep));
  color: white;
  border: none;
  border-radius: 60px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}
.error-msg {
  color: #e74c3c;
  font-size: 13px;
  margin-top: 12px;
}

/* Admin Content */
.admin-content {
  display: none;
}
.admin-header {
  background: linear-gradient(135deg, var(--azh-dark) 0%, #3f2618 100%);
  padding: 20px 32px;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
}
.admin-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
}
.admin-header h1 span {
  color: var(--azh-gold);
}
.header-right {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.sync-status {
  background: rgba(255,255,255,0.15);
  padding: 8px 18px;
  border-radius: 40px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-dot {
  width: 8px;
  height: 8px;
  background: #2ecc71;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.header-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  padding: 8px 20px;
  border-radius: 40px;
  color: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}
.header-btn:hover {
  background: rgba(255,255,255,0.25);
}
.header-btn.logout {
  background: #c0392b;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 20px;
  padding: 28px 32px;
}
.stat-card {
  background: white;
  border-radius: 28px;
  padding: 24px 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--azh-border);
  transition: all 0.3s;
}
.stat-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-md);
}
.stat-card h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--azh-muted);
  margin-bottom: 10px;
}
.stat-number {
  font-size: 36px;
  font-weight: 800;
  color: var(--azh-primary);
}
.stat-number.small {
  font-size: 28px;
}

/* Orders Section */
.orders-section {
  padding: 0 32px 32px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.orders-container {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-height: 55vh;
  overflow-y: auto;
  padding-right: 8px;
}
.orders-container::-webkit-scrollbar {
  width: 5px;
}
.orders-container::-webkit-scrollbar-track {
  background: #e2cfb5;
  border-radius: 10px;
}
.orders-container::-webkit-scrollbar-thumb {
  background: var(--azh-primary);
  border-radius: 10px;
}

.order-card {
  background: white;
  border-radius: 24px;
  padding: 20px;
  border-left: 6px solid var(--azh-gold);
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-15px); }
  to { opacity: 1; transform: translateX(0); }
}
.order-card.pending {
  border-left-color: var(--azh-primary);
  background: linear-gradient(135deg, white, #fffaf5);
}
.order-card.ready {
  border-left-color: #f39c12;
}
.order-card.done {
  border-left-color: #95a5a6;
  opacity: 0.8;
}
.order-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 14px;
}
.order-id {
  font-weight: 800;
  font-size: 18px;
  font-family: monospace;
  background: #f5f0ea;
  padding: 4px 12px;
  border-radius: 40px;
}
.badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.badge {
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 11px;
  font-weight: 700;
}
.badge-pay {
  background: #e8f0ff;
  color: #2255cc;
}
.customer-name {
  background: #e8f5e9;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 11px;
  font-weight: 600;
  color: var(--azh-green);
}
.order-items {
  background: #faf6f0;
  border-radius: 16px;
  padding: 14px;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.6;
}
.order-items span {
  display: block;
  padding: 4px 0;
  border-bottom: 1px dashed #e2cfb5;
}
.order-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
}
.order-total {
  font-size: 22px;
  font-weight: 800;
  color: var(--azh-primary);
}
.order-time {
  font-size: 11px;
  color: var(--azh-muted);
}
.action-btn {
  background: linear-gradient(135deg, var(--azh-primary), var(--azh-deep));
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.action-btn:hover {
  transform: scale(1.02);
}
.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--azh-muted);
  background: white;
  border-radius: 24px;
}
.empty-state-icon {
  font-size: 60px;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  display: none;
}
.modal-card {
  background: white;
  border-radius: 32px;
  padding: 32px;
  width: 90%;
  max-width: 380px;
  animation: modalPop 0.3s ease;
}
@keyframes modalPop {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
.modal-card h3 {
  font-size: 24px;
  margin-bottom: 20px;
  color: var(--azh-primary);
}
.modal-card input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--azh-border);
  border-radius: 60px;
  margin-bottom: 15px;
}
.modal-card button {
  width: 100%;
  padding: 12px;
  background: var(--azh-primary);
  color: white;
  border: none;
  border-radius: 60px;
  font-weight: 700;
  cursor: pointer;
}
.modal-card .cancel-btn {
  background: #ccc;
  color: #333;
  margin-top: 8px;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--azh-dark);
  color: #ffecb3;
  padding: 10px 20px;
  border-radius: 40px;
  font-size: 12px;
  z-index: 1200;
  display: none;
}

@media (max-width: 700px) {
  .stats-grid { padding: 16px; gap: 12px; }
  .orders-section { padding: 0 16px 20px; }
  .admin-header { padding: 16px 20px; flex-direction: column; text-align: center; }
  .header-right { justify-content: center; }
}
</style>
</head>
<body>

<!-- LOGIN MODAL -->
<div id="loginModal" class="login-overlay">
  <div class="login-card">
    <h2>🔐 Admin Portal</h2>
    <div class="login-input-group">
      <label>👤 Username</label>
      <input type="text" id="loginUsername" class="login-input" placeholder="Enter username">
    </div>
    <div class="login-input-group">
      <label>🔒 Password</label>
      <input type="password" id="loginPassword" class="login-input" placeholder="Enter password" onkeypress="if(event.key==='Enter') checkLogin()">
    </div>
    <button class="login-btn" onclick="checkLogin()">Login →</button>
    <div id="loginError" class="error-msg"></div>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div id="changePwdModal" class="modal-overlay">
  <div class="modal-card">
    <h3>🔑 Change Password</h3>
    <input type="text" id="currentUsername" placeholder="Current Username">
    <input type="password" id="currentPassword" placeholder="Current Password">
    <input type="password" id="newPassword" placeholder="New Password (min 4 chars)">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <button onclick="changePassword()">Update</button>
    <button class="cancel-btn" onclick="closeChangePwdModal()">Cancel</button>
  </div>
</div>

<!-- MAIN ADMIN CONTENT -->
<div id="adminContent" class="admin-content">
  <div class="admin-header">
    <div>
      <h1>🍛 Azhagu <span>Admin</span></h1>
      <p style="font-size: 12px; opacity: 0.7;">Cross-Device Order Management</p>
    </div>
    <div class="header-right">
      <div class="sync-status">
        <div class="sync-dot"></div>
        <span id="syncStatusText">Connected</span>
      </div>
      <button class="header-btn" onclick="openChangePwdModal()">🔐 Change Password</button>
      <button class="header-btn" onclick="forceSync()">⟳ Sync Now</button>
      <button class="header-btn logout" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><h3>📊 Total Orders</h3><div class="stat-number" id="totalOrders">0</div></div>
    <div class="stat-card"><h3>⏳ Pending</h3><div class="stat-number" id="pendingOrders">0</div></div>
    <div class="stat-card"><h3>🔥 Ready</h3><div class="stat-number" id="readyOrders">0</div></div>
    <div class="stat-card"><h3>✅ Completed</h3><div class="stat-number" id="completedOrders">0</div></div>
    <div class="stat-card"><h3>💰 Revenue</h3><div class="stat-number small" id="totalRevenue">₹0</div></div>
  </div>

  <div class="orders-section">
    <div class="section-title"><span>📋</span> Live Orders</div>
    <div id="ordersContainer" class="orders-container">
      <div class="empty-state"><div class="empty-state-icon">🍽️</div><div>No orders yet</div></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ==================== CONSTANTS ====================
const STORAGE_KEY = 'azhagu_orders';
const ADMIN_CRED_KEY = 'azhagu_admin_credentials';
const DEFAULT_USERNAME = 'admin';
const DEFAULT_PASSWORD = 'admin123';

// Initialize admin credentials
if (!localStorage.getItem(ADMIN_CRED_KEY)) {
  localStorage.setItem(ADMIN_CRED_KEY, JSON.stringify({
    username: DEFAULT_USERNAME,
    password: DEFAULT_PASSWORD
  }));
}

// Initialize empty orders if not exists
if (!localStorage.getItem(STORAGE_KEY)) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
}

let refreshInterval = null;
let lastOrderCount = 0;

// ==================== HELPER FUNCTIONS ====================
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = isError ? '#c0392b' : 'var(--azh-dark)';
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 3000);
}

function playSound() {
  try {
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.connect(gain);
    gain.connect(audio.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.2;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.00001, audio.currentTime + 0.5);
    osc.stop(audio.currentTime + 0.5);
  } catch(e) {}
}

// ==================== LOAD ORDERS ====================
function loadOrders() {
  const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  
  if (orders.length > lastOrderCount && lastOrderCount > 0) {
    playSound();
    showToast(`🔔 ${orders.length - lastOrderCount} new order(s) received!`);
  }
  lastOrderCount = orders.length;
  
  const pending = orders.filter(o => o.status === 'pending').length;
  const ready = orders.filter(o => o.status === 'ready').length;
  const completed = orders.filter(o => o.status === 'done').length;
  const revenue = orders.filter(o => o.status === 'done').reduce((s, o) => s + (o.total || 0), 0);
  
  document.getElementById('totalOrders').innerText = orders.length;
  document.getElementById('pendingOrders').innerText = pending;
  document.getElementById('readyOrders').innerText = ready;
  document.getElementById('completedOrders').innerText = completed;
  document.getElementById('totalRevenue').innerHTML = '₹' + revenue.toFixed(2);
  
  const container = document.getElementById('ordersContainer');
  if (orders.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🍽️</div><div>No orders yet. Place an order from the customer menu.</div><div style="font-size:12px; margin-top:10px;">📱 Open index.html on any device to place orders</div></div>`;
    return;
  }
  
  container.innerHTML = orders.map((order, idx) => {
    const statusClass = order.status === 'pending' ? 'pending' : (order.status === 'ready' ? 'ready' : 'done');
    const statusText = order.status === 'pending' ? '⏳ Pending' : (order.status === 'ready' ? '🔥 Ready' : '✅ Done');
    const statusBg = order.status === 'pending' ? '#ffede3' : (order.status === 'ready' ? '#fff8e0' : '#e0e0e0');
    const statusColor = order.status === 'pending' ? 'var(--azh-primary)' : (order.status === 'ready' ? '#c99c00' : '#666');
    
    return `
      <div class="order-card ${statusClass}">
        <div class="order-header">
          <div class="order-id">${order.id}</div>
          <div class="badges">
            <span class="badge badge-pay">💰 ${order.payMethod || 'UPI'}</span>
            <span class="customer-name">👤 ${order.customerName || 'Guest'}</span>
            <span class="badge" style="background:${statusBg}; color:${statusColor}">${statusText}</span>
          </div>
        </div>
        <div class="order-items">
          ${order.lines.map(l => `<span>🍽️ ${l.name} × ${l.qty} — ₹${(l.total || l.price * l.qty).toFixed(2)}</span>`).join('')}
          ${order.gstRate && order.gstRate > 0 ? `<div style="font-size:11px; color:#888; margin-top:8px;">📊 GST ${order.gstRate}% (CGST: ₹${(order.cgst||0).toFixed(2)} | SGST: ₹${(order.sgst||0).toFixed(2)})</div>` : ''}
        </div>
        <div class="order-footer">
          <div class="order-total">₹${(order.total || 0).toFixed(2)}</div>
          <div class="order-time">📅 ${order.date || ''} | 🕐 ${order.time || ''}</div>
          ${order.status !== 'done' ? `<button class="action-btn" onclick="updateOrderStatus(${idx}, '${order.status === 'pending' ? 'ready' : 'done'}')">${order.status === 'pending' ? '✓ Mark Ready' : '✅ Complete'}</button>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function updateOrderStatus(orderIndex, newStatus) {
  const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (orders[orderIndex]) {
    orders[orderIndex].status = newStatus;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    loadOrders();
    showToast(`✅ Order ${orders[orderIndex].id} marked as ${newStatus === 'ready' ? 'Ready' : 'Completed'}`);
    if (newStatus === 'ready') playSound();
  }
}

function forceSync() {
  loadOrders();
  showToast('🔄 Orders synced!');
  playSound();
}

// ==================== LOGIN ====================
function checkLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const cred = JSON.parse(localStorage.getItem(ADMIN_CRED_KEY));
  
  if (username === cred.username && password === cred.password) {
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadOrders();
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(loadOrders, 2000);
    showToast(`✅ Welcome, ${username}!`);
  } else {
    document.getElementById('loginError').innerHTML = '❌ Invalid username or password!';
  }
}

function logout() {
  document.getElementById('adminContent').style.display = 'none';
  document.getElementById('loginModal').style.display = 'flex';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  if (refreshInterval) clearInterval(refreshInterval);
  showToast('🔒 Logged out');
}

// ==================== CHANGE PASSWORD ====================
function openChangePwdModal() {
  document.getElementById('changePwdModal').style.display = 'flex';
}

function closeChangePwdModal() {
  document.getElementById('changePwdModal').style.display = 'none';
}

function changePassword() {
  const currUser = document.getElementById('currentUsername').value.trim();
  const currPass = document.getElementById('currentPassword').value;
  const newPass = document.getElementById('newPassword').value;
  const confirmPass = document.getElementById('confirmPassword').value;
  const cred = JSON.parse(localStorage.getItem(ADMIN_CRED_KEY));
  
  if (currUser !== cred.username || currPass !== cred.password) {
    showToast('❌ Current username/password incorrect!', true);
    return;
  }
  if (newPass.length < 4) {
    showToast('❌ Password must be at least 4 characters!', true);
    return;
  }
  if (newPass !== confirmPass) {
    showToast('❌ Passwords do not match!', true);
    return;
  }
  
  cred.password = newPass;
  localStorage.setItem(ADMIN_CRED_KEY, JSON.stringify(cred));
  closeChangePwdModal();
  showToast('✅ Password changed! Please login again.');
  setTimeout(() => logout(), 1500);
}

// ==================== STORAGE EVENT (Cross-tab) ====================
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY && document.getElementById('adminContent').style.display === 'block') {
    loadOrders();
    playSound();
  }
});
</script>
</body>
</html>
