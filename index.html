<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Azhagu Hotel - Order Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --azh-primary: #b7410e;
            --azh-deep: #8b2c0d;
            --azh-gold: #e6b422;
            --azh-cream: #fff9ef;
            --azh-green: #2a7f49;
            --azh-dark: #2c1a0f;
            --azh-card: #ffffff;
            --azh-border: #f0e2cf;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--azh-cream);
            color: var(--azh-dark);
        }
        .app-nav {
            display: flex;
            background: var(--azh-dark);
            padding: 0 16px;
            gap: 4px;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .nt {
            padding: 14px 18px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 248, 235, 0.7);
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .nt.active {
            color: var(--azh-gold);
            border-bottom-color: var(--azh-gold);
        }
        .view {
            display: none;
            min-height: 100vh;
            flex-direction: column;
        }
        .view.active {
            display: flex;
        }
        .hero {
            background: linear-gradient(135deg, var(--azh-primary) 0%, var(--azh-deep) 100%);
            padding: 20px;
            color: white;
        }
        .hero-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .logo-box {
            width: 50px;
            height: 50px;
            border-radius: 20px;
            background: var(--azh-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .logo-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
        }
        .welcome-name {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
        }
        .search-bar {
            padding: 12px 16px;
            background: white;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--azh-border);
            border-radius: 50px;
            font-size: 14px;
        }
        .fbar {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid var(--azh-border);
        }
        .fpill {
            padding: 6px 18px;
            border-radius: 40px;
            border: 1.5px solid var(--azh-border);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            background: white;
        }
        .fpill.active {
            background: var(--azh-primary);
            color: white;
        }
        .mgrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px 16px;
        }
        @media (max-width: 480px) {
            .mgrid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .mc {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--azh-border);
            transition: all 0.2s;
        }
        .mi {
            position: relative;
            width: 100%;
            padding-top: 75%;
            background: #faeedb;
        }
        .mi .me {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .mb {
            padding: 10px 12px 14px;
        }
        .mn {
            font-size: 15px;
            font-weight: 700;
        }
        .mprice {
            font-size: 16px;
            font-weight: 800;
            color: var(--azh-primary);
        }
        .mrow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .qw {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fef6ed;
            padding: 2px 6px;
            border-radius: 40px;
        }
        .qb {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: white;
        }
        .qb.plus {
            background: var(--azh-primary);
            color: white;
        }
        .qb.minus {
            border: 1px solid #e2cfb5;
        }
        .cbar {
            background: var(--azh-dark);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            bottom: 0;
        }
        .ct {
            font-size: 22px;
            font-weight: 800;
        }
        .pbtn {
            background: var(--azh-gold);
            color: var(--azh-dark);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 700;
            cursor: pointer;
        }
        .pbtn:disabled {
            background: #9b7b5c;
            opacity: 0.5;
            cursor: not-allowed;
        }
        .name-modal, .payment-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .name-modal.open, .payment-modal.open {
            opacity: 1;
            pointer-events: all;
        }
        .name-card, .payment-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        .name-input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--azh-border);
            border-radius: 60px;
            margin: 20px 0;
            font-size: 16px;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c1a0f;
            color: #ffecb3;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 999;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .order-history-list {
            padding: 16px;
        }
        .history-item {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--azh-border);
        }
        .history-id {
            font-weight: 800;
            color: var(--azh-primary);
        }
    </style>
</head>
<body>

<nav class="app-nav">
    <div class="nt active" data-view="customer">🍛 Menu</div>
    <div class="nt" data-view="orders">📜 My Orders</div>
</nav>

<div class="view active" id="view-customer">
    <div class="hero">
        <div class="hero-row">
            <div class="logo-box">✨</div>
            <div class="logo-text">
                <h1>Azhagu Hotel</h1>
                <p>Multi-User Order System</p>
            </div>
            <div class="welcome-name" id="welcomeNameBtn" onclick="openNameModal()">👤 Tap to add name</div>
        </div>
    </div>
    
    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search dishes...">
    </div>
    
    <div class="fbar" id="filterBar">
        <div class="fpill active" data-cat="all">All</div>
        <div class="fpill" data-cat="tiffin">Tiffin</div>
        <div class="fpill" data-cat="drinks">Drinks</div>
        <div class="fpill" data-cat="rice">Rice</div>
    </div>
    
    <div class="mgrid" id="menuGrid"></div>
    
    <div class="cbar">
        <div><div class="cl" id="cartLbl">0 items</div><div class="ct" id="cartTotal">₹0</div></div>
        <button class="pbtn" id="placeBtn" disabled onclick="placeOrder()">Order →</button>
    </div>
</div>

<div class="view" id="view-orders">
    <div class="hero" style="background: linear-gradient(135deg, #2c1a0f, #3f2618);">
        <div class="hero-row">
            <div class="logo-box">📜</div>
            <div class="logo-text"><h1>My Orders</h1><p>Order history</p></div>
        </div>
    </div>
    <div id="orderHistoryList" class="order-history-list"></div>
</div>

<div id="nameModal" class="name-modal">
    <div class="name-card">
        <h3>👤 Enter Your Name</h3>
        <input type="text" id="customerName" class="name-input" placeholder="Your name">
        <button class="pbtn" onclick="saveCustomerName()">Continue</button>
    </div>
</div>

<div id="paymentModal" class="payment-modal">
    <div class="payment-card">
        <h3>💵 Confirm Order</h3>
        <p id="paymentAmount" style="font-size: 24px; margin: 20px;">Total: ₹0</p>
        <button class="pbtn" onclick="confirmOrder()" style="background: #2a7f49; color: white; width: 100%;">Confirm Order</button>
        <button onclick="closePaymentModal()" style="margin-top: 10px; background: none; border: none; color: #999; cursor: pointer;">Cancel</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // ========== YOUR FIREBASE CONFIGURATION ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBLrk_nmC2V0NvRKfhHdFzBi647xiuF1y0",
        authDomain: "azhagu-hotel.firebaseapp.com",
        projectId: "azhagu-hotel",
        storageBucket: "azhagu-hotel.firebasestorage.app",
        messagingSenderId: "357401937469",
        appId: "1:357401937469:web:a7a55fc0e59a5059660c54"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // ========== MENU DATA ==========
    const menuData = [
        {id: 1, name: 'Ghee Roast Dosa', price: 65, category: 'tiffin', emoji: '🥞'},
        {id: 2, name: 'Mini Idly', price: 30, category: 'tiffin', emoji: '🍚'},
        {id: 3, name: 'Masala Dosa', price: 70, category: 'tiffin', emoji: '🥞'},
        {id: 4, name: 'Vada', price: 15, category: 'tiffin', emoji: '🍩'},
        {id: 5, name: 'Pongal', price: 55, category: 'tiffin', emoji: '🍲'},
        {id: 6, name: 'Filter Coffee', price: 22, category: 'drinks', emoji: '☕'},
        {id: 7, name: 'Badam Milk', price: 35, category: 'drinks', emoji: '🥛'},
        {id: 8, name: 'Elaneer Juice', price: 45, category: 'drinks', emoji: '🥥'},
        {id: 9, name: 'Lemon Rice', price: 50, category: 'rice', emoji: '🍚'},
        {id: 10, name: 'Curd Rice', price: 45, category: 'rice', emoji: '🍚'}
    ];
    
    // Global variables
    let cart = {};
    let customerName = localStorage.getItem('customerName') || '';
    let currentFilter = 'all';
    let searchQuery = '';
    
    // Render menu
    function renderMenu() {
        const grid = document.getElementById('menuGrid');
        let filtered = menuData;
        if (currentFilter !== 'all') {
            filtered = filtered.filter(i => i.category === currentFilter);
        }
        if (searchQuery) {
            filtered = filtered.filter(i => i.name.toLowerCase().includes(searchQuery.toLowerCase()));
        }
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:40px;">No items found</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(item => {
            const qty = cart[item.id] || 0;
            return `
                <div class="mc">
                    <div class="mi"><div class="me">${item.emoji}</div></div>
                    <div class="mb">
                        <div class="mn">${item.name}</div>
                        <div class="mrow">
                            <div class="mprice">₹${item.price}</div>
                            <div class="qw">
                                ${qty > 0 ? `<button class="qb minus" onclick="updateCart(${item.id}, -1)">−</button><span class="qn">${qty}</span>` : ''}
                                <button class="qb plus" onclick="updateCart(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function updateCart(id, delta) {
        const newQty = Math.max(0, (cart[id] || 0) + delta);
        if (newQty === 0) delete cart[id];
        else cart[id] = newQty;
        renderMenu();
        updateCartBar();
    }
    
    function updateCartBar() {
        let total = 0, count = 0;
        for (const [id, qty] of Object.entries(cart)) {
            const item = menuData.find(i => i.id == id);
            total += item.price * qty;
            count += qty;
        }
        document.getElementById('cartTotal').innerHTML = '₹' + total;
        document.getElementById('cartLbl').innerText = count + ' items';
        document.getElementById('placeBtn').disabled = count === 0;
    }
    
    function openNameModal() {
        if (!customerName) {
            document.getElementById('nameModal').classList.add('open');
        }
    }
    
    function saveCustomerName() {
        const name = document.getElementById('customerName').value.trim();
        if (name === '') {
            showToast('Please enter your name', true);
            return;
        }
        customerName = name;
        localStorage.setItem('customerName', customerName);
        document.getElementById('welcomeNameBtn').innerHTML = `👤 ${customerName}`;
        document.getElementById('nameModal').classList.remove('open');
        showToast(`Welcome ${customerName}!`);
    }
    
    function placeOrder() {
        if (Object.keys(cart).length === 0) return;
        if (!customerName) {
            openNameModal();
            return;
        }
        
        let total = 0;
        const items = [];
        for (const [id, qty] of Object.entries(cart)) {
            const item = menuData.find(i => i.id == id);
            items.push({name: item.name, qty, price: item.price, total: item.price * qty});
            total += item.price * qty;
        }
        
        document.getElementById('paymentAmount').innerHTML = `Total: ₹${total}`;
        document.getElementById('paymentModal').classList.add('open');
    }
    
    function closePaymentModal() {
        document.getElementById('paymentModal').classList.remove('open');
    }
    
    async function confirmOrder() {
        let total = 0;
        const items = [];
        for (const [id, qty] of Object.entries(cart)) {
            const item = menuData.find(i => i.id == id);
            items.push({name: item.name, qty, price: item.price, total: item.price * qty});
            total += item.price * qty;
        }
        
        const orderId = `ORD-${Date.now()}`;
        const order = {
            id: orderId,
            customerName: customerName,
            items: items,
            total: total,
            status: 'pending',
            timestamp: new Date().toISOString(),
            device: /Mobile/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop'
        };
        
        try {
            // Save to Firebase Firestore - ALL DEVICES CAN SEE!
            await db.collection('orders').add(order);
            
            showToast(`✅ Order placed! ID: ${orderId}`);
            
            // Save to local history
            let history = JSON.parse(localStorage.getItem('order_history') || '[]');
            history.unshift(order);
            localStorage.setItem('order_history', JSON.stringify(history.slice(0, 20)));
            
            // Clear cart
            cart = {};
            renderMenu();
            updateCartBar();
            closePaymentModal();
            
        } catch (error) {
            console.error('Error placing order:', error);
            showToast('❌ Failed to place order. Check internet!', true);
        }
    }
    
    function loadOrderHistory() {
        const history = JSON.parse(localStorage.getItem('order_history') || '[]');
        const container = document.getElementById('orderHistoryList');
        if (history.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">No orders yet</div>';
            return;
        }
        container.innerHTML = history.map(order => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between;">
                    <span class="history-id">${order.id}</span>
                    <span style="color:${order.status === 'pending' ? '#b7410e' : '#2a7f49'}">${order.status || 'pending'}</span>
                </div>
                <div style="font-size:12px; margin:8px 0;">${order.items.map(i => `${i.name}×${i.qty}`).join(', ')}</div>
                <div><strong>₹${order.total}</strong> | ${new Date(order.timestamp).toLocaleTimeString()}</div>
            </div>
        `).join('');
    }
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.background = isError ? '#c0392b' : '#2c1a0f';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderMenu();
    });
    
    document.querySelectorAll('.fpill').forEach(p => {
        p.addEventListener('click', () => {
            document.querySelectorAll('.fpill').forEach(f => f.classList.remove('active'));
            p.classList.add('active');
            currentFilter = p.dataset.cat;
            renderMenu();
        });
    });
    
    document.querySelectorAll('.nt').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.nt').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`view-${tab.dataset.view}`).classList.add('active');
            if (tab.dataset.view === 'orders') loadOrderHistory();
        });
    });
    
    // Initialize
    if (customerName) {
        document.getElementById('welcomeNameBtn').innerHTML = `👤 ${customerName}`;
    } else {
        setTimeout(() => openNameModal(), 500);
    }
    
    renderMenu();
    updateCartBar();
</script>
</body>
</html>
